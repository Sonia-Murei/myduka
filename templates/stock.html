{% extends 'base.html' %}
{% block title %} Stock {% endblock %}

{% block content%}

<div>
    <p>This is the stock page</p>
</div>

<div>
    <div>
        <div>
            <table id="example" class="table table-striped">
                <thead>
                    <tr>
                        <th>Stocks ID</th>
                        <th>Product ID</th>
                        <th>Stock Quantity</th>
                        <th>Created at</th>

                    </tr>
                </thead>
                <tbody>
                    {% for i in stocks_data %}
                    <tr>
                        <td>{{ i[0] }}</td>
                        <td>{{ i[1] }}</td>
                        <td>{{ i[2] }}</td>
                        <td>{{ i[3] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
