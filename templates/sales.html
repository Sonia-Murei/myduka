{% extends 'base.html' %}
{% block title %} Sales {% endblock %}

{% block content%}

<div>
    <p>This is the sales page</p>
</div>

<div>
    <form action="/add_sales" method="post">
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Product ID</label>
            <input type="text" name="pid" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
        </div>
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Quantity</label>
            <input type="number" name="qt" class="form-control" id="exampleInputPassword1">
        </div>
        <button type="submit" class="btn btn-primary">Add Sale</button>
    </form>
</div>

<div>
    <div>
        <table id="example" class="table table-striped">
            <thead>
                <tr>
                    <th>Sales ID</th>
                    <th>Product ID</th>
                    <th>Quantity</th>
                    <th>Created at</th>

                </tr>
            </thead>
            <tbody>
                {% for i in sales_data %}
                <tr>
                    <td>{{ i[0] }}</td>
                    <td>{{ i[1] }}</td>
                    <td>{{ i[2] }}</td>
                    <td>{{ i[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
